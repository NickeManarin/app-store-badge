trigger: none
name: $(Date:yyyyMMdd).$(Rev:r)
resources:
  pipelines:
    - pipeline: "_StoreWeb-BadgeBuild"
      project: "Universal Store"
      source: "Store Web - Badge Build"
  repositories:
    - repository: 1ESPipelineTemplates
      type: git
      name: 1ESPipelineTemplates/1ESPipelineTemplates
      ref: refs/tags/release
extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      networkIsolationPolicy: Permissive,CFSClean,CFSClean2
    pool:
      name: StoreWebBuildPool-Centeral
    serviceTreeId: 08017428-4bd3-446d-a7e9-3a428afa5ba3
    customBuildTags:
      - ES365AIMigrationTooling-Release-MOBR
    stages:
      - stage: Deploy_Static_Web_App
        displayName: Deploy Static Web App
        jobs:
          - job: DeployJob
            displayName: Deploy Static Web App Job
            condition: succeeded()
            timeoutInMinutes: 0
            templateContext:
              inputs:
                - input: pipelineArtifact
                  buildType: specific
                  project: Universal Store
                  definition: 151610
                  branchName: main
                  artifactName: "ms-store-badge-artifacts"
                  targetPath: "$(System.ArtifactsDirectory)"
            steps:
              - checkout: self

              - task: NpmAuthenticate@0
                inputs:
                  workingFile: ".npmrc"
                displayName: "Authenticate to NPM"

              - script: |
                  npm install @azure/static-web-apps-cli --global --globalconfig .npmrc
                workingDirectory: $(Build.SourcesDirectory)/
                displayName: "Install SWA CLI"

              - script: |
                  swa deploy "$(System.ArtifactsDirectory)" --deployment-token $(DEPLOYMENT_TOKEN) --env production
                displayName: "Deploy to prod SWA"

      - stage: Deploy_To_PROD_SA
        displayName: Drop badge build to Prod SA
        trigger: manual
        templateContext:
          cloud: Public
          isProduction: true
          approval:
            workflow: lockbox
            scope:
              serviceGroupName: APS Store Web
              subscriptionIds:
                - $(subscriptionId)
        jobs:
          - job: Job_2
            displayName: Agent job
            condition: succeeded()
            timeoutInMinutes: 0
            templateContext:
              type: releaseJob
              inputs:
                - input: pipelineArtifact
                  buildType: specific
                  definition: 151610
                  project: Universal Store
                  branchName: main
                  artifactName: "ms-store-badge-artifacts"
                  targetPath: "$(System.ArtifactsDirectory)"
              workflow: m365-custom
            steps:
              - task: prepare-deployment@1
                inputs:
                  taskType: credentialFetchTaskAzureRM
                  armserviceconnection: Arm-Public-Placeholder-Endpoint
                  subscriptionid: $(subscriptionId)

              - task: AzureFileCopy@6
                displayName: "File Copy Bundle"
                inputs:
                  SourcePath: $(System.ArtifactsDirectory)/badge/ms-store-badge.bundled.js
                  ConnectedServiceNameARM: Arm-Public-Placeholder-Endpoint
                  Destination: AzureBlob
                  StorageAccountRM: sabadgedelivery
                  ContainerName: $web

              - task: AzureFileCopy@6
                displayName: "File Copy Images"
                inputs:
                  SourcePath: $(System.ArtifactsDirectory)/images
                  ConnectedServiceNameARM: Arm-Public-Placeholder-Endpoint
                  Destination: AzureBlob
                  StorageAccountRM: sabadgedelivery
                  ContainerName: $web
