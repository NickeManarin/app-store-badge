# This pipeline is a basic starter for using 1ESPipelineTemplates to build in a VM.
# Refer to our onboarding documentation at https://aka.ms/1espt for more details and support channels.
name: Daily Repo Health Check
trigger: none

schedules:
  - cron: "0 16 * * 1,4" # Monday (1) and Thursday (4) at 8 AM PST
    displayName: "Bi-Weekly Build runs every Monday and Thursday at 8 AM PST"
    branches:
      include:
        - main
    always: true

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release
  - repository: SFCClientCommon
    type: git
    name: Universal Store/SFC.Client.Common
    ref: main

extends:
  template: v1/1ES.Unofficial.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    customBuildTags:
    - 1ES.PT.ViaStartRight
    pool:
      name: StoreWebBuildPool-Centeral

    sdl:
      sourceAnalysisPool:
        name: StoreWebBuildPool-Centeral
        os: windows

    stages:
    - stage: GeneratePRReport
      displayName: Generate PR Report
      jobs:
      - job: GeneratePRJob
        displayName: Start PR Status Report
        steps:
        - checkout: self
          persistCredentials: true
        - template: Build/steps/QA Repo Health Check Template.yml@SFCClientCommon
          parameters:
              azureSubscription: 'SparkBuildPipelines-ServiceConnection'
              resourceGroup: '$(ResourceGroup)'
              appServiceName: '$(AppService)'
              subscriptionId: '$(SparkSubscriptionID)'
              repositoryName: '$(Build.Repository.Name)'
              systemAccessToken: '$(System.AccessToken)'
              outputFileName: 'PRSummary.txt'
              logicAppEndpoint: '$(Workflow-Endpoint)'
              includeSlotCleanup: false
              slotExemptions: []
              displayName: "Daily PR Report Generation"
              organization: 'microsoft'
